name: Search Videos
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Search video sites
        run: |
          pip install requests 2>/dev/null
          python3 -c "
          import requests, json, os, re

          query = '${{ github.event.inputs.query }}'
          results = []

          # 1. YouTube Search (via Piped or Invidious)
          print('Searching YouTube...')
          for inst in ['pipedapi.kavin.rocks', 'pipedapi.adminforge.de']:
              try:
                  r = requests.get(f'https://{inst}/search', params={'q': query, 'filter': 'videos'}, timeout=10)
                  if r.status_code == 200:
                      data = r.json()
                      items = data.get('items', data) if isinstance(data, dict) else data
                      for v in (items[:15] if isinstance(items, list) else []):
                          vid_url = v.get('url', '')
                          if vid_url and not vid_url.startswith('http'):
                              vid_url = f'https://www.youtube.com{vid_url}'
                          results.append({
                              'title': v.get('title', ''),
                              'url': vid_url,
                              'thumb': v.get('thumbnail', ''),
                              'duration': v.get('duration', 0),
                              'source': 'YouTube'
                          })
                      if results: break
              except Exception as e:
                  print(f'  {inst}: {e}')

          # If Piped failed, try Invidious
          if not any(r['source'] == 'YouTube' for r in results):
              for inst in ['inv.nadeko.net', 'invidious.nerdvpn.de', 'invidious.protokolla.fi']:
                  try:
                      r = requests.get(f'https://{inst}/api/v1/search', params={'q': query, 'type': 'video'}, timeout=10)
                      if r.status_code == 200:
                          for v in r.json()[:15]:
                              results.append({
                                  'title': v.get('title', ''),
                                  'url': f'https://www.youtube.com/watch?v={v.get(\"videoId\",\"\")}',
                                  'thumb': (v.get('videoThumbnails', [{}])[0].get('url', '') if v.get('videoThumbnails') else ''),
                                  'duration': v.get('lengthSeconds', 0),
                                  'source': 'YouTube'
                              })
                          if results: break
                  except Exception as e:
                      print(f'  {inst}: {e}')

          # 2. Dailymotion
          print('Searching Dailymotion...')
          try:
              r = requests.get('https://api.dailymotion.com/videos', params={
                  'search': query, 'fields': 'id,title,thumbnail_240_url,duration,url',
                  'limit': 10, 'sort': 'relevance'
              }, timeout=10)
              if r.status_code == 200:
                  for v in r.json().get('list', []):
                      results.append({
                          'title': v.get('title',''),
                          'url': v.get('url',''),
                          'thumb': v.get('thumbnail_240_url',''),
                          'duration': v.get('duration',0),
                          'source': 'Dailymotion'
                      })
          except: pass

          # 3. Archive.org
          print('Searching Archive.org...')
          try:
              r = requests.get('https://archive.org/advancedsearch.php', params={
                  'q': query + ' mediatype:movies',
                  'fl[]': 'identifier,title,description',
                  'rows': 10, 'output': 'json'
              }, timeout=10)
              if r.status_code == 200:
                  for doc in r.json().get('response',{}).get('docs',[]):
                      results.append({
                          'title': doc.get('title',''),
                          'url': f\"https://archive.org/details/{doc.get('identifier','')}\",
                          'thumb': f\"https://archive.org/services/img/{doc.get('identifier','')}\",
                          'duration': 0,
                          'source': 'Archive.org'
                      })
          except: pass

          # 4. Vimeo
          print('Searching Vimeo...')
          try:
              r = requests.get(f'https://api.vimeo.com/videos?query={query}&per_page=10&sort=relevant',
                  headers={'Authorization': 'Bearer unauthenticated', 'Accept': 'application/vnd.vimeo.*+json;version=3.4'},
                  timeout=10)
              if r.status_code == 200:
                  for v in r.json().get('data', []):
                      pics = v.get('pictures',{}).get('sizes',[])
                      thumb = pics[2]['link'] if len(pics) > 2 else ''
                      results.append({
                          'title': v.get('name',''),
                          'url': v.get('link',''),
                          'thumb': thumb,
                          'duration': v.get('duration',0),
                          'source': 'Vimeo'
                      })
          except: pass

          # 5. Hidabroot
          print('Searching Hidabroot...')
          try:
              r = requests.get(f'https://www.hidabroot.org/search', params={'q': query},
                  headers={'User-Agent': 'Mozilla/5.0'}, timeout=10)
              if r.status_code == 200:
                  links = re.findall(r'href=\"(/video/\d+)\"[^>]*>([^<]+)', r.text)
                  seen = set()
                  for link, title in links[:10]:
                      if link not in seen:
                          seen.add(link)
                          results.append({
                              'title': title.strip(),
                              'url': f'https://www.hidabroot.org{link}',
                              'thumb': '',
                              'duration': 0,
                              'source': 'הידברות'
                          })
          except: pass

          print(f'Total: {len(results)} results')
          os.makedirs('docs', exist_ok=True)
          with open('docs/search_results.json', 'w', encoding='utf-8') as f:
              json.dump({'query': query, 'results': results}, f, ensure_ascii=False)
          "

      - name: Publish results
        run: |
          git config user.email "bot@github.com"
          git config user.name "Search Bot"
          git add docs/search_results.json
          git commit -m "Search: ${{ github.event.inputs.query }}" || true
          git push || true
