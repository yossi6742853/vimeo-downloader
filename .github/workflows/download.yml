name: Download Vimeo Videos
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download videos
        run: |
          mkdir -p videos
          while IFS= read -r line; do
            vid_id=$(echo "$line" | jq -r '.vimeo_id')
            title=$(echo "$line" | jq -r '.title')
            echo "Downloading: $title ($vid_id)"
            yt-dlp \
              --referer "https://chazon-ish.com/" \
              -f "best[height<=720]" \
              --merge-output-format mp4 \
              --no-overwrites \
              -o "videos/%(title)s [%(id)s].%(ext)s" \
              "https://player.vimeo.com/video/$vid_id" \
              || echo "FAILED: $vid_id"
          done < <(jq -c '.[]' vimeo_ids.json | head -20)

      - name: Upload to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chazon-ish-videos
          path: videos/
          retention-days: 7
