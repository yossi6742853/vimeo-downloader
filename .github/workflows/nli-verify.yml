name: NLI Verify Creator
on:
  workflow_dispatch:
    inputs:
      seed_url:
        description: 'NLI seed URL — find related and show creator/title for first 5'
        required: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - name: Wait FlareSolverr
        run: |
          for i in $(seq 1 30); do curl -fs http://localhost:8191/ >/dev/null 2>&1 && break; sleep 2; done
      - name: Find related
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: python3 nli_find_related.py "${{ github.event.inputs.seed_url }}"
      - name: Verify creator
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: python3 nli_verify_creator.py "${{ github.event.inputs.seed_url }}"
