name: List Channel
on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID'
        required: true
jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install
        run: pip install -U yt-dlp
      - name: List all videos
        run: |
          yt-dlp --flat-playlist --print "%(id)s|%(title)s" \
            "https://www.youtube.com/channel/${{ github.event.inputs.channel }}/videos" \
            > video_list.txt 2>errors.txt || true
          echo "Total: $(wc -l < video_list.txt) videos"
          echo "=== Errors ==="
          cat errors.txt
      - name: Upload list
        uses: actions/upload-artifact@v4
        with:
          name: video-list
          path: video_list.txt
