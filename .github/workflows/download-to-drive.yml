name: Download to Drive
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL to download'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install tools
        run: |
          pip install -U yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Download video
        run: |
          mkdir -p videos
          echo "Downloading: ${{ github.event.inputs.url }}"
          yt-dlp \
            --no-overwrites \
            -o "videos/%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}" 2>&1 || true
          echo "=== Files ==="
          ls -lh videos/ || echo "No files"

      - name: Upload to Google Drive
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os, glob

          token_resp = requests.post("https://oauth2.googleapis.com/token", data={
              "client_id": os.environ["CLIENT_ID"],
              "client_secret": os.environ["CLIENT_SECRET"],
              "refresh_token": os.environ["REFRESH_TOKEN"],
              "grant_type": "refresh_token"
          })
          token = token_resp.json()["access_token"]
          headers = {"Authorization": f"Bearer {token}"}

          r = requests.get("https://www.googleapis.com/drive/v3/files",
              params={"q": "name='סרטונים שהורדו' and mimeType='application/vnd.google-apps.folder' and trashed=false", "fields": "files(id)"},
              headers=headers)
          files = r.json().get("files", [])
          folder_id = files[0]["id"] if files else requests.post("https://www.googleapis.com/drive/v3/files",
              headers={**headers, "Content-Type": "application/json"},
              json={"name": "סרטונים שהורדו", "mimeType": "application/vnd.google-apps.folder"}).json()["id"]

          for fpath in glob.glob("videos/*"):
              fname = os.path.basename(fpath)
              size = os.path.getsize(fpath)
              if size < 1000:
                  print(f"Skipping tiny file: {fname} ({size} bytes)")
                  continue
              print(f"Uploading: {fname} ({size/1024/1024:.1f} MB)")
              r = requests.post("https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable",
                  headers={**headers, "Content-Type": "application/json"},
                  json={"name": fname, "parents": [folder_id]})
              if r.status_code == 200:
                  with open(fpath, "rb") as f:
                      r2 = requests.put(r.headers["Location"], data=f, headers={"Content-Type": "video/mp4"})
                  print(f"{'SUCCESS' if r2.status_code==200 else 'FAILED'}: {r2.status_code}")
              else:
                  print(f"Init failed: {r.status_code}")
          PYEOF
