name: YouTube to Drive
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          pip install -U yt-dlp requests
          # Install free proxy tools
          pip install httpx[socks]

      - name: Download YouTube via multiple methods
        run: |
          mkdir -p videos
          python3 << 'PYEOF'
          import requests, os, sys, subprocess, json

          url = "${{ github.event.inputs.url }}"
          vid = ""
          if "v=" in url: vid = url.split("v=")[1].split("&")[0]
          elif "youtu.be/" in url: vid = url.split("youtu.be/")[1].split("?")[0]
          print(f"Video ID: {vid}")

          ok = False

          # Method 1: Free SOCKS5 proxies with yt-dlp
          print("\n=== Method 1: yt-dlp with free proxies ===")
          try:
              # Get free proxy list
              r = requests.get("https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks5&timeout=5000&country=all", timeout=10)
              proxies = [p.strip() for p in r.text.strip().split("\n") if p.strip()][:10]
              print(f"Got {len(proxies)} proxies")

              for proxy in proxies:
                  print(f"  Trying proxy: {proxy}")
                  result = subprocess.run([
                      "yt-dlp", "--proxy", f"socks5://{proxy}",
                      "--socket-timeout", "15",
                      "--no-overwrites", "-o", "videos/%(title)s.%(ext)s",
                      url
                  ], capture_output=True, text=True, timeout=60)
                  if result.returncode == 0:
                      files = [f for f in os.listdir("videos") if os.path.getsize(f"videos/{f}") > 10000]
                      if files:
                          print(f"  SUCCESS with proxy {proxy}!")
                          ok = True
                          break
                  else:
                      err = result.stderr[-100:] if result.stderr else ""
                      if "bot" not in err.lower():
                          print(f"  Proxy error (not bot): {err}")
          except Exception as e:
              print(f"  Proxy method error: {e}")

          # Method 2: Use web download services
          if not ok:
              print("\n=== Method 2: Web services ===")
              services = [
                  {"name": "savefrom", "url": f"https://worker.sf-tools.com/savefrom.php?url={url}&lang=en"},
                  {"name": "loader.to", "url": f"https://ab.cococococ.com/ajax/download.php?format=mp4&url={url}"},
              ]
              for svc in services:
                  try:
                      print(f"  Trying {svc['name']}...")
                      r = requests.get(svc["url"], timeout=15, headers={"User-Agent": "Mozilla/5.0"})
                      print(f"  Status: {r.status_code}, Length: {len(r.text)}")
                      if r.status_code == 200:
                          data = r.json() if r.headers.get("content-type","").startswith("application/json") else {}
                          dl_url = data.get("url") or data.get("download_url") or ""
                          if dl_url:
                              print(f"  Got download URL! Downloading...")
                              r2 = requests.get(dl_url, stream=True, timeout=300)
                              with open("videos/youtube_video.mp4", "wb") as f:
                                  for chunk in r2.iter_content(8192): f.write(chunk)
                              if os.path.getsize("videos/youtube_video.mp4") > 10000:
                                  ok = True; break
                  except Exception as e:
                      print(f"  {svc['name']}: {e}")

          # Method 3: Piped instances
          if not ok:
              print("\n=== Method 3: Piped ===")
              # Get fresh list of Piped instances
              try:
                  r = requests.get("https://raw.githubusercontent.com/TeamPiped/Piped/master/instances.json", timeout=10)
                  instances = [i["api_url"] for i in r.json() if "api_url" in i][:8]
              except:
                  instances = ["https://pipedapi.kavin.rocks", "https://pipedapi.adminforge.de"]

              for inst in instances:
                  try:
                      print(f"  Trying: {inst}")
                      r = requests.get(f"{inst}/streams/{vid}", timeout=15)
                      if r.status_code != 200: continue
                      data = r.json()
                      streams = data.get("videoStreams", [])
                      best = None
                      for s in streams:
                          if not s.get("videoOnly", True):
                              best = s; break
                      if not best and streams: best = streams[0]
                      if best and best.get("url"):
                          print(f"  Downloading: {best.get('quality','')}")
                          r2 = requests.get(best["url"], stream=True, timeout=300)
                          title = data.get("title", "youtube_video")
                          with open(f"videos/{title}.mp4", "wb") as f:
                              for chunk in r2.iter_content(8192): f.write(chunk)
                          if os.path.getsize(f"videos/{title}.mp4") > 10000:
                              ok = True; break
                  except Exception as e:
                      print(f"  {inst}: {e}")

          # Results
          files = [f for f in os.listdir("videos") if os.path.getsize(f"videos/{f}") > 1000]
          print(f"\n=== Result: {len(files)} files ===")
          for f in files:
              print(f"  {f}: {os.path.getsize(f'videos/{f}')/1024/1024:.1f} MB")
          if not files:
              sys.exit(1)
          PYEOF

      - name: Upload to Google Drive
        if: success()
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python3 -c "
          import requests, os, glob
          token = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['CLIENT_ID'], 'client_secret': os.environ['CLIENT_SECRET'],
              'refresh_token': os.environ['REFRESH_TOKEN'], 'grant_type': 'refresh_token'
          }).json()['access_token']
          headers = {'Authorization': f'Bearer {token}'}
          r = requests.get('https://www.googleapis.com/drive/v3/files',
              params={'q': \"name='סרטונים שהורדו' and mimeType='application/vnd.google-apps.folder' and trashed=false\", 'fields': 'files(id)'},
              headers=headers)
          files = r.json().get('files', [])
          fid = files[0]['id'] if files else requests.post('https://www.googleapis.com/drive/v3/files',
              headers={**headers, 'Content-Type': 'application/json'},
              json={'name': 'סרטונים שהורדו', 'mimeType': 'application/vnd.google-apps.folder'}).json()['id']
          for fp in glob.glob('videos/*'):
              sz = os.path.getsize(fp)
              if sz < 1000: continue
              fn = os.path.basename(fp)
              print(f'Uploading: {fn} ({sz/1024/1024:.1f} MB)')
              r = requests.post('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable',
                  headers={**headers, 'Content-Type': 'application/json'}, json={'name': fn, 'parents': [fid]})
              if r.status_code == 200:
                  with open(fp, 'rb') as f:
                      r2 = requests.put(r.headers['Location'], data=f, headers={'Content-Type': 'video/mp4'})
                  print(f\"{'SUCCESS' if r2.status_code==200 else 'FAILED'}: {r2.status_code}\")
          "
