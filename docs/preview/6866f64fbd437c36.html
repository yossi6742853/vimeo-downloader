<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חדשות | N12 אתר החדשות של ישראל</title>
<style>
*{box-sizing:border-box}
body{font-family:'Segoe UI','Heebo','David',Arial,sans-serif;line-height:1.7;color:#222;background:#fafafa;margin:0;padding:0}
.reader-container{max-width:760px;margin:0 auto;padding:30px 24px;background:#fff;min-height:100vh;box-shadow:0 0 30px rgba(0,0,0,0.05)}
.reader-header{border-bottom:2px solid #eee;padding-bottom:20px;margin-bottom:30px}
.reader-header h1{font-size:1.8rem;line-height:1.3;margin:0 0 8px;color:#111}
.reader-header .reader-source{color:#888;font-size:.85rem;direction:ltr;display:inline-block}
.reader-header .reader-source a{color:#1a73e8;text-decoration:none}
.reader-content{font-size:1.05rem}
.reader-content p{margin:0 0 1em}
.reader-content img{margin:16px 0;border-radius:6px}
.reader-content a{color:#1a73e8}
.reader-content h2,.reader-content h3{margin:1.2em 0 .5em}
.reader-content blockquote{border-right:4px solid #1a73e8;margin:1em 0;padding:.5em 1em;background:#f5f9ff;color:#444}
.reader-banner{background:#fff8dc;border:1px solid #f0d000;color:#776800;padding:8px 14px;border-radius:6px;font-size:.85rem;margin-bottom:20px}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#ddd}
  .reader-container{background:#222;box-shadow:0 0 30px rgba(0,0,0,0.6)}
  .reader-header h1{color:#fff}
  .reader-header{border-color:#333}
  .reader-content blockquote{background:#1c2632;color:#ccc;border-color:#3b82f6}
}
</style>
</head>
<body>
<div class="reader-container">
  <div class="reader-banner">📖 מצב קריאה — תוכן בלבד (תמונות + טקסט). <a href="https://www.n12.co.il/" target="_blank" rel="noopener" style="color:#1a73e8;text-decoration:none">פתח דף מקורי ↗</a></div>
  <div class="reader-header">
    <h1>חדשות | N12 אתר החדשות של ישראל</h1>
    <div class="reader-source"><a href="https://www.n12.co.il/" target="_blank" rel="noopener">https://www.n12.co.il/</a></div>
  </div>
  <div class="reader-content"><html><body></body></html></div>
</div>
</body>
</html>
