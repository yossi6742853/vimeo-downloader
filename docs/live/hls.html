<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>HLS Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    video { width: 100%; height: 100vh; background: #000; }
    .err { color: #f55; padding: 20px; text-align: center; font-family: sans-serif; }
  </style>
</head>
<body>
  <video id="v" controls autoplay playsinline></video>
  <div id="err" class="err" style="display:none"></div>
<script>
const params = new URLSearchParams(window.location.search);
const url = params.get('url');
const label = params.get('label') || '';
const v = document.getElementById('v');
const err = document.getElementById('err');

if (!url) {
  err.textContent = 'אין כתובת'; err.style.display = 'block';
} else if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(url);
  hls.attachMedia(v);
  hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
  hls.on(Hls.Events.ERROR, (e, d) => {
    if (d.fatal) { err.textContent = 'שגיאה: ' + d.details + ' - אולי נטפרי חוסם'; err.style.display = 'block'; }
  });
} else if (v.canPlayType('application/vnd.apple.mpegurl')) {
  v.src = url; v.play();
} else {
  err.textContent = 'הדפדפן לא תומך'; err.style.display = 'block';
}
</script>
</body>
</html>
